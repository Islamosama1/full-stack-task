services:
  frontend:
    build:
      context: ./apps/frontend
      target: dev
    ports:
      - '3000:3000'
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  backend:
    build:
      context: ./apps/backend
      target: dev
    ports:
      - '4000:4000'
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
