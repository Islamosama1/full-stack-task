services:
  frontend:
    build:
      context: ./apps/frontend
      target: dev
    ports:
      - '${FRONTEND_PORT}:3000'
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV}
      - VITE_API_URL=http://localhost:${BACKEND_PORT}

  backend:
    build:
      context: ./apps/backend
      target: dev
    ports:
      - '${BACKEND_PORT}:4000'
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - '${MONGO_PORT}:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
